<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="台股一鍵查詢 - 產業地位、EPS、本益比、法人評價">
    <title>台股一鍵查詢器</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary: #0052cc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft JhengHei", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .search-box {
            padding: 30px;
            text-align: center;
            background: #f8f9fa;
        }
        input {
            padding: 15px 20px;
            width: 65%;
            font-size: 18px;
            border: 2px solid var(--primary);
            border-radius: 50px;
            outline: none;
        }
        button {
            padding: 15px 32px;
            font-size: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-left: 10px;
        }
        button:hover { background: #003d99; }
        
        #result {
            padding: 30px;
            display: none;
        }
        .error {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }
        .stock-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .card {
            background: #f8f9fa;
            padding: 18px;
            border-radius: 12px;
            margin: 15px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            padding: 14px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }
        th { background: #f1f3f5; }
        .positive { color: #00b74a; }
        .negative { color: #f93154; }
        .loading { text-align: center; padding: 40px; }
        .na { color: #999; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🇹🇼 台股一鍵查詢器</h1>
        <p>快速查看產業地位、估值與法人看法</p>
    </header>

    <div class="search-box">
        <input type="text" id="symbol" placeholder="輸入股票代碼或名稱，例如：2330 或 台積電" 
               onkeypress="if(event.key==='Enter') searchStock()">
        <button onclick="searchStock()">🔍 查詢</button>
    </div>

    <div id="result">
        <div id="error" class="error"></div>
        
        <div id="loading" class="loading" style="display:none;">
            <h3>查詢中...</h3>
        </div>
        
        <div id="content" style="display:none;">
            <div class="stock-header">
                <h2 id="stockName"></h2>
            </div>

            <div class="card">
                <strong>目前價格：</strong> <span id="price" style="font-size:28px;font-weight:bold;"></span> TWD
                <span id="priceChange" style="margin-left: 20px; font-size: 18px;"></span>
            </div>

            <table>
                <tr><th>項目</th><th>數值</th></tr>
                <tr><td>產業</td><td id="industry"></td></tr>
                <tr><td>產業地位</td><td id="position"></td></tr>
                <tr><td>目前 EPS (TTM)</td><td id="eps"></td></tr>
                <tr><td>目前本益比 (PE)</td><td id="pe"></td></tr>
                <tr><td>預估未來 EPS</td><td id="futureEps"></td></tr>
                <tr><td>預估本益比</td><td id="futurePe"></td></tr>
            </table>

            <div class="card">
                <strong>法人評價 & 大摩看法</strong><br><br>
                <div id="analyst"></div>
            </div>

            <canvas id="priceChart" height="120"></canvas>
        </div>
    </div>
</div>

<script>
// 台灣股票資料 API 整合 - 支援所有上市上櫃股票

async function getStockData(symbol) {
    symbol = symbol.toUpperCase().trim();
    
    try {
        // 第一步：將股票名稱轉換為代碼
        let stockCode = symbol;
        
        // 如果輸��是名稱，先嘗試查詢代碼
        if (isNaN(symbol)) {
            stockCode = await searchStockByName(symbol);
            if (!stockCode) {
                throw new Error(`找不到股票：${symbol}`);
            }
        } else {
            // 補齊零至4位數
            stockCode = symbol.padStart(4, '0');
        }

        // 第二步：從多個 API 取得股票資訊
        const [basicInfo, priceInfo, analysis] = await Promise.all([
            fetchStockBasicInfo(stockCode),
            fetchStockPrice(stockCode),
            fetchStockAnalysis(stockCode)
        ]);

        if (!basicInfo || !priceInfo) {
            throw new Error(`無法取得股票 ${stockCode} 的資料`);
        }

        return {
            symbol: stockCode,
            name: basicInfo.name,
            price: priceInfo.price,
            change: priceInfo.change,
            changePercent: priceInfo.changePercent,
            industry: basicInfo.industry || '未分類',
            position: basicInfo.position || '查詢中...',
            eps: priceInfo.eps || 'N/A',
            pe: priceInfo.pe || 'N/A',
            futureEps: analysis.futureEps || 'N/A',
            futurePe: analysis.futurePe || 'N/A',
            analyst: analysis.analyst || '暫無評論',
            priceHistory: priceInfo.history || []
        };
    } catch (e) {
        throw new Error(e.message);
    }
}

// 查詢股票名稱對應的代碼 - 使用 Finmind 開放資料
async function searchStockByName(name) {
    try {
        // 使用 Finmind 台灣股票基本資訊查詢
        const finmindUrl = `https://api.finmindtrade.com/api/v3/data?dataset=TaiwanStockInfo&limit=1000`;
        const finmindRes = await Promise.race([
            fetch(finmindUrl),
            new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 5000))
        ]).catch(() => null);
        
        if (finmindRes && finmindRes.ok) {
            const data = await finmindRes.json();
            if (data.data) {
                const match = data.data.find(stock => 
                    stock.stock_name.includes(name) || stock.stock_id === name
                );
                if (match) return match.stock_id;
            }
        }

        return null;
    } catch (e) {
        console.error('Stock name search error:', e);
        return null;
    }
}

// 取得股票基本資訊
async function fetchStockBasicInfo(stockCode) {
    try {
        // 使用 Finmind 台灣股票基本資訊
        const response = await Promise.race([
            fetch(`https://api.finmindtrade.com/api/v3/data?dataset=TaiwanStockInfo&data_id=${stockCode}`),
            new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 5000))
        ]);

        if (response && response.ok) {
            const data = await response.json();
            if (data.data && data.data.length > 0) {
                const stock = data.data[0];
                return {
                    name: stock.stock_name || `股票 ${stockCode}`,
                    industry: stock.industry || '未分類',
                    position: `代碼: ${stock.stock_id}, 市場: ${stock.market_type || '未知'}`
                };
            }
        }
        
        return {
            name: `股票 ${stockCode}`,
            industry: '未分類',
            position: '產業資訊查詢中...'
        };
    } catch (e) {
        console.error('Basic info fetch error:', e);
        return {
            name: `股票 ${stockCode}`,
            industry: '未分類',
            position: '無法取得產業資訊'
        };
    }
}

// 取得股票價格資訊
async function fetchStockPrice(stockCode) {
    try {
        // 使用 Finmind 台灣股票日行情資料
        const today = new Date();
        const sixDaysAgo = new Date(today.getTime() - 6 * 24 * 60 * 60 * 1000);
        
        const startDate = sixDaysAgo.toISOString().split('T')[0];
        const endDate = today.toISOString().split('T')[0];

        const response = await Promise.race([
            fetch(`https://api.finmindtrade.com/api/v3/data?dataset=TaiwanStockPrice&data_id=${stockCode}&start_date=${startDate}&end_date=${endDate}`),
            new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 5000))
        ]);

        if (response && response.ok) {
            const data = await response.json();
            if (data.data && data.data.length > 0) {
                const latest = data.data[data.data.length - 1];
                const previous = data.data.length > 1 ? data.data[data.data.length - 2] : latest;
                
                const change = (latest.close - previous.close).toFixed(2);
                const changePercent = ((change / previous.close) * 100).toFixed(2);
                
                const history = data.data.slice(-6).map(d => parseFloat(d.close));

                return {
                    price: parseFloat(latest.close),
                    change: parseFloat(change),
                    changePercent: parseFloat(changePercent),
                    eps: 'N/A',
                    pe: 'N/A',
                    history: history
                };
            }
        }

        throw new Error('無法取得股價資料');
    } catch (e) {
        console.error('Price fetch error:', e);
        return null;
    }
}

// 取得股票分析資訊
async function fetchStockAnalysis(stockCode) {
    try {
        // 使用 Finmind 台灣股票月營收或財務資訊
        const response = await Promise.race([
            fetch(`https://api.finmindtrade.com/api/v3/data?dataset=TaiwanStockMonthRevenue&data_id=${stockCode}&limit=1`),
            new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 5000))
        ]);

        let analyst = '正在查詢法人資訊...';
        let futureEps = 'N/A';
        let futurePe = 'N/A';

        if (response && response.ok) {
            const data = await response.json();
            if (data.data && data.data.length > 0) {
                analyst = '法人資訊來自市場公開資料。建議參考 TradingView 或 Yahoo Finance 查看最新研究報告';
            }
        }

        return {
            futureEps: futureEps,
            futurePe: futurePe,
            analyst: analyst
        };
    } catch (e) {
        console.error('Analysis fetch error:', e);
        return {
            futureEps: 'N/A',
            futurePe: 'N/A',
            analyst: '法人分析資訊查詢中...'
        };
    }
}

async function searchStock() {
    const input = document.getElementById('symbol').value.trim();
    if (!input) return showError('請輸入股票代碼或名稱');

    const errorDiv = document.getElementById('error');
    errorDiv.style.display = 'none';
    
    document.getElementById('loading').style.display = 'block';
    document.getElementById('content').style.display = 'none';
    document.getElementById('result').style.display = 'block';

    try {
        const data = await getStockData(input);
        
        // 填充資料
        document.getElementById('stockName').innerHTML = `${data.name} <small>(${data.symbol}.TW)</small>`;
        document.getElementById('price').textContent = data.price.toFixed(2);
        
        const changeClass = data.change >= 0 ? 'positive' : 'negative';
        const changeSymbol = data.change >= 0 ? '▲' : '▼';
        document.getElementById('priceChange').innerHTML = 
            `<span class="${changeClass}">${changeSymbol} ${Math.abs(data.change).toFixed(2)} (${data.changePercent}%)</span>`;
        
        document.getElementById('industry').textContent = data.industry;
        document.getElementById('position').textContent = data.position;
        document.getElementById('eps').textContent = data.eps;
        document.getElementById('pe').textContent = data.pe;
        document.getElementById('futureEps').textContent = data.futureEps;
        document.getElementById('futurePe').textContent = data.futurePe;
        document.getElementById('analyst').innerHTML = data.analyst;

        // 畫圖
        if (data.priceHistory && data.priceHistory.length > 0) {
            renderChart(data.priceHistory);
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
    } catch (e) {
        showError(`查詢失敗：${e.message}`);
        document.getElementById('loading').style.display = 'none';
    }
}

function showError(message) {
    const errorDiv = document.getElementById('error');
    errorDiv.textContent = message;
    errorDiv.style.display = 'block';
}

function renderChart(priceHistory) {
    const ctx = document.getElementById('priceChart');
    if (window.myChart) window.myChart.destroy();
    
    window.myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['前5日', '前4日', '前3日', '前2日', '昨日', '今日'],
            datasets: [{
                label: '股價走勢',
                data: priceHistory,
                borderColor: '#0052cc',
                tension: 0.4,
                fill: false,
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: {
                    beginAtZero: false
                }
            }
        }
    });
}
</script>
</body>
</html>
